<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Dropdown Menu</title>
  <style>
    * {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

/* Dropdown container */
.dropdown {
  /* position: relative; */
  /* display: inline-block; */
}

/* Button */
.dropbtn {
  background-color: #3498db;
  color: white;
  padding: 12px 20px;
  font-size: 16px;
  border: none;
  cursor: pointer;
}

/* Dropdown content (hidden by default) */
.dropdown-content {
  display: none;
  position: absolute;
  background-color: #f1f1f1;
  min-width: 160px;
  box-shadow: 0px 8px 16px rgba(0,0,0,0.2);
}

/* Links inside dropdown */
.dropdown-content a {
  color: black;
  padding: 10px 14px;
  text-decoration: none;
  display: block;
}

/* Hover effects */
.dropdown-content a:hover {
  background-color: #ddd;
}

/* ⭐ Main logic: hover par show */
.dropdown:hover .dropdown-content {
  display: block;
}

.dropdown:hover .dropbtn {
  background-color: #2980b9;
}


  </style>
</head>
<body>

  <div class="dropdown">
    <button class="dropbtn">Menu</button>

    <div class="dropdown-content">
      <a href="#">Home</a>
      <a href="#">About</a>
      <a href="#">Contact</a>
    </div>
  </div>

</body>
</html>
