<style> 
    /*universal selector >> yeh selector pure page par apply hota hai*/
    /* * { 
        font-size: 20px;

      /* descendant selector >> yeh selector dad or uske child ko select karta hai /or  bus pehli div or uske andr ke div ko style denga  */
        /* #the_cat h1{
        color: blue;            
      } */

      /* child selector >> yeh bus child ko style karta hai or ya div ke andr ke div ko hi style karta hai */
        /* #the_cat >  h1{
        color: blue;
     } */

     /* sibling selector >> yeh or nayi div ko style karenga for ex: chacha*/
        /* #the_cat ~ div  {
            background-color: rgb(225, 34, 34);
        } */

        /* adjacent sibling selector >> yeh selector bus ek or pehli nayi div ko hi style karega   */

        #the_cat + div{
        color: brown;
    } 
    
</style>
